# Render.com Blueprint (Free Tier - No Credit Card Required)
# Deploys PostgreSQL and Node.js backend
# Note: Redis omitted for free tier - can be added manually later

services:
  # Backend API
  - type: web
    name: raastaa-api
    runtime: node
    region: singapore  # Closest to Bangalore
    plan: free  # Completely free, no credit card
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000  # Render uses port 10000 for free tier
      - key: DATABASE_URL
        fromDatabase:
          name: raastaa-db
          property: connectionString
      - key: REDIS_URL
        value: "redis://localhost:6379"  # Fallback (won't work but won't crash)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"  # Update with your actual domain
      - key: LOG_LEVEL
        value: info

databases:
  # PostgreSQL with PostGIS
  - name: raastaa-db
    plan: free  # 90 day free trial, then $7/month
    databaseName: raastaa
    user: raastaa
    region: singapore


