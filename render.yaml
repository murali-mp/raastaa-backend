# Render.com Blueprint
# Deploys PostgreSQL, Redis, and Node.js backend

services:
  # Backend API
  - type: web
    name: raastaa-api
    runtime: node
    region: singapore  # Closest to Bangalore
    plan: starter  # Free tier available
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: raastaa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raastaa-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"  # Update with your actual domain
      - key: LOG_LEVEL
        value: info

  # Redis
  - type: redis
    name: raastaa-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # PostgreSQL with PostGIS
  - name: raastaa-db
    plan: starter  # Free tier available
    databaseName: raastaa
    user: raastaa
    region: singapore
    postgresMajorVersion: 15

