# Render.com Blueprint (With Redis - Requires Credit Card)
# Use this version if you have a credit card and want Redis

services:
  # Backend API
  - type: web
    name: raastaa-api
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: raastaa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raastaa-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: info

  # Redis
  - type: redis
    name: raastaa-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: raastaa-db
    plan: starter
    databaseName: raastaa
    user: raastaa
    region: singapore
